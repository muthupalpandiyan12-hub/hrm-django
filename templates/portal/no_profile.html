{% extends 'portal/base_portal.html' %}
{% block title %}No Profile{% endblock %}
{% block page_title %}No Profile Linked{% endblock %}

{% block content %}
<div class="card p-5 text-center" style="max-width:500px;margin:60px auto;">
    <div style="font-size:3.5rem;color:#cbd5e1;margin-bottom:16px;"><i class="bi bi-person-x"></i></div>
    <h5 style="font-weight:700;color:#0f172a;margin-bottom:8px;">No Employee Profile Linked</h5>
    <p style="color:#64748b;font-size:0.9rem;margin-bottom:24px;">Your account is not linked to any employee record. Please contact your HR Admin to fix this.</p>
    <a href="/logout/" class="btn btn-green px-4" style="border-radius:10px;font-weight:600;">Logout</a>
</div>
{% endblock %}
